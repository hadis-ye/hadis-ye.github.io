<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <span class="nav prev" onclick="prevImage()">&#10094;</span>
  <img id="lightbox-img" src="" alt="">
  <span class="nav next" onclick="nextImage()">&#10095;</span>
</div>

<script>
const images = [
  "/photos/weddingpic/exterior_1.jpg",
  "/photos/weddingpic/exterior_2.jpg",
  "/photos/weddingpic/exterior_3.jpg",
  "/photos/weddingpic/interior_1.jpg",
  "/photos/weddingpic/interiro_2.jpg",
  "/photos/weddingpic/interior_3.jpg",
  "/photos/weddingpic/joyous_1.jpg",
  "/photos/weddingpic/joyous_2.jpg",
  "/photos/weddingpic/joyous_3.jpg",
  "/photos/weddingpic/joyous_4.jpg",
  "/photos/weddingpic/joyous_5.jpg"
];
let currentIndex = 0;
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

function showImage(index) {
  currentIndex = index;
  lightboxImg.src = images[index];
  lightbox.classList.add("active");
  document.body.style.overflow = "hidden";
}

function openLightbox(index) { showImage(index); }
function closeLightbox() {
  lightbox.classList.remove("active");
  document.body.style.overflow = "auto";
}
function prevImage() {
  showImage((currentIndex - 1 + images.length) % images.length);
}
function nextImage() {
  showImage((currentIndex + 1) % images.length);
}

document.querySelectorAll(".gallery-item").forEach((item, index) => {
  item.addEventListener("click", () => openLightbox(index));
});

document.addEventListener("keydown", (e) => {
  if (!lightbox.classList.contains("active")) return;
  if (e.key === "Escape") closeLightbox();
  if (e.key === "ArrowLeft") prevImage();
  if (e.key === "ArrowRight") nextImage();
});

lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox) closeLightbox();
});
</script>
